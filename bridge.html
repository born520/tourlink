<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>카카오 공유</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      color: #fee500;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #fee500;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 15px; font-weight: 700; }
    #sub { font-size: 12px; color: #aaa; }
    #err { font-size: 12px; color: #f44336; margin-top: 8px; text-align: center; max-width: 300px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div id="msg">카카오 공유 준비 중...</div>
  <div id="sub"></div>
  <div id="err"></div>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <script>
    const APP_KEY = 'cf840e74cf6ef3dcdd5cf2c128961fe1';

    // URL 파라미터 파싱
    const p = new URLSearchParams(location.search);
    const shareUrl = p.get('url')    || 'https://www.1ink.kr';
    const title    = p.get('title')  || '투어링크';
    const desc     = p.get('desc')   || '';
    const imgUrl   = p.get('img')    || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800';

    document.getElementById('sub').textContent = title;

    function run() {
      try {
        if (!Kakao.isInitialized()) Kakao.init(APP_KEY);
        document.getElementById('msg').textContent = '카카오 공유 팝업 열기...';

        Kakao.Share.sendDefault({
          objectType: 'feed',
          content: {
            title: title,
            description: desc,
            imageUrl: imgUrl,
            link: {
              mobileWebUrl: shareUrl,
              webUrl: shareUrl
            }
          },
          buttons: [{
            title: '확인하기',
            link: {
              mobileWebUrl: shareUrl,
              webUrl: shareUrl
            }
          }]
        });

        document.getElementById('msg').textContent = '✅ 친구를 선택하고 전송하세요';
        document.getElementById('sub').textContent = '';

      } catch(e) {
        document.getElementById('err').textContent = '오류: ' + e.message;
        console.error(e);
      }
    }

    // SDK 로드 완료 후 실행
    window.addEventListener('load', () => {
      setTimeout(run, 500);
    });
  </script>
</body>
</html>
