<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>투어링크 카카오 공유</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      color: #fee500;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #fee500;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 15px; font-weight: 700; }
    #sub { font-size: 12px; color: #aaa; }
    #err { font-size: 12px; color: #f44336; margin-top: 8px; text-align: center; max-width: 300px; }
    #debug { font-size: 10px; color: #666; margin-top: 16px; max-width: 300px; text-align: left; max-height: 150px; overflow-y: auto; font-family: monospace; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div id="msg">카카오 공유 준비 중...</div>
  <div id="sub"></div>
  <div id="err"></div>
  <div id="debug"></div>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <script>
    const APP_KEY = 'cf840e74cf6ef3dcdd5cf2c128961fe1';
    const DEBUG = true;

    function log(msg) {
      if (DEBUG) {
        const debugEl = document.getElementById('debug');
        debugEl.textContent += msg + '\n';
        debugEl.scrollTop = debugEl.scrollHeight;
      }
      console.log('[투어링크]', msg);
    }

    function getParams() {
      const params = new URLSearchParams(location.search);
      let shareUrl = params.get('url') || 'https://www.tourlink.kr';
      
      try {
        new URL(shareUrl);
      } catch (e) {
        shareUrl = 'https://www.tourlink.kr';
      }

      return {
        shareUrl: shareUrl,
        title: params.get('title') || '추천 링크',
        desc: params.get('desc') || '링크를 클릭해 내용을 확인해보세요.',
        imgUrl: params.get('img') || ''
      };
    }

    const { shareUrl, title, desc, imgUrl } = getParams();
    log('📤 발송 정보 설정 완료');
    log('🔗 이동할 주소: ' + shareUrl);

    function run() {
      try {
        log('🚀 카카오 SDK 초기화 중...');
        if (!Kakao.isInitialized()) {
          Kakao.init(APP_KEY);
          log('✓ Kakao 초기화 성공');
        }
        
        document.getElementById('msg').textContent = '📱 카카오 공유 팝업 열기...';

        // 🔑 핵심: 클릭 시 이동 주소(link)를 사용자가 넣은 shareUrl로 고정
        const shareObject = {
          objectType: 'feed',
          content: {
            title: title,
            description: desc,
            imageUrl: imgUrl || 'https://www.tourlink.kr/favicon.ico', // 이미지가 비어있을 때 방어 코드
            link: {
              mobileWebUrl: shareUrl,
              webUrl: shareUrl
            }
          },
          buttons: [{
            title: '확인하기',
            link: {
              mobileWebUrl: shareUrl,
              webUrl: shareUrl
            }
          }]
        };

        log('📤 커스텀 피드 전송 시작...');
        Kakao.Share.sendDefault(shareObject);

        document.getElementById('msg').textContent = '✅ 친구를 선택하고 전송하세요';
        log('✓ 공유 팝업 호출 완료');

      } catch(e) {
        document.getElementById('err').textContent = '오류: ' + e.message;
        log('✗ 오류 발생: ' + e.message);
        console.error(e);
      }
    }

    window.addEventListener('load', () => { 
      setTimeout(run, 500); 
    });

    setTimeout(() => {
      if (window.opener) {
        window.close();
      }
    }, 5000);
  </script>
</body>
</html>
