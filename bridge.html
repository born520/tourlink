<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>투어링크 카카오 공유</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      color: #fee500;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #fee500;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 15px; font-weight: 700; }
    #sub { font-size: 12px; color: #aaa; }
    #err { font-size: 12px; color: #f44336; margin-top: 8px; text-align: center; max-width: 300px; }
    #debug { font-size: 10px; color: #666; margin-top: 16px; max-width: 300px; text-align: left; max-height: 150px; overflow-y: auto; font-family: monospace; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div id="msg">카카오 공유 준비 중...</div>
  <div id="sub"></div>
  <div id="err"></div>
  <div id="debug"></div>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <script>
    const APP_KEY = 'cf840e74cf6ef3dcdd5cf2c128961fe1';
    const DEBUG = true;

    function log(msg) {
      if (DEBUG) {
        const debugEl = document.getElementById('debug');
        debugEl.textContent += msg + '\n';
        debugEl.scrollTop = debugEl.scrollHeight;
      }
      console.log('[투어링크]', msg);
    }

    function getParams() {
      const params = new URLSearchParams(location.search);
      let shareUrl = params.get('url') || 'https://www.tourlink.kr';
      try { new URL(shareUrl); } catch (e) { shareUrl = 'https://www.tourlink.kr'; }

      return {
        shareUrl: shareUrl,
        title: params.get('title') || '',
        desc: params.get('desc') || '',
        imgUrl: params.get('img') || ''
      };
    }

    const { shareUrl, title, desc, imgUrl } = getParams();
    
    // 가이드라인 버그수정본 준수: 제목과 설명이 모두 없을 때만 직접 이동 판정
    const isClickedLink = (!title || title === '투어링크') && (!desc || desc === '');
    
    log('🔍 판정 결과: ' + (isClickedLink ? '링크 다이렉트 이동 모드' : '카카오톡 공유 모드'));

    if (isClickedLink) {
      log('🔗 이동 감지 → 즉시 타겟 주소로 리다이렉트');
      window.location.href = shareUrl;
      throw new Error('redirect');
    }

    function run() {
      try {
        if (!Kakao.isInitialized()) {
          Kakao.init(APP_KEY);
        }
        
        document.getElementById('msg').textContent = '📱 카카오 공유 팝업 열기...';

        // ⚠️ 가이드 경고 준수: 필수 필드 기본값 보정 및 빈 문자열 방어
        const shareObject = {
          objectType: 'feed',
          content: {
            title: title || '투어링크 추천',
            description: desc || '링크를 확인해보세요.',
            link: { mobileWebUrl: shareUrl, webUrl: shareUrl }
          },
          // 🔑 수정 포인트: buttons 배열에 버튼 2개 정의 (최대 2개 제한)
          buttons: [
            {
              title: '브로슈어 보기', // 1번 버튼 (왼쪽)
              link: { mobileWebUrl: shareUrl, webUrl: shareUrl }
            },
            {
              title: '카톡 상담하기', // 2번 버튼 (오른쪽)
              // 테스트용으로 투어링크 공식 채널 주소 혹은 shareUrl을 연결
              link: { mobileWebUrl: 'https://pf.kakao.com/_xeExbexj', webUrl: 'https://pf.kakao.com/_xeExbexj' }
            }
          ]
        };

        // 이미지 주소가 확실히 있을 때만 안전하게 필드 주입
        if (imgUrl && imgUrl.trim()) {
          shareObject.content.imageUrl = imgUrl.trim();
        }

        log('📤 버튼 2개 파라미터 구성 완료');
        console.log('[투어링크] shareObject 구조:', shareObject);
        
        Kakao.Share.sendDefault(shareObject);
        document.getElementById('msg').textContent = '✅ 친구를 선택하고 전송하세요';

      } catch(e) {
        document.getElementById('err').textContent = '오류: ' + e.message;
        console.error(e);
      }
    }

    window.addEventListener('load', () => { setTimeout(run, 500); });
    setTimeout(() => { if (window.opener) window.close(); }, 5000);
  </script>
</body>
</html>
