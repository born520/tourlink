<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>투어링크 카카오 공유</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      color: #fee500;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #fee500;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 15px; font-weight: 700; }
    #sub { font-size: 12px; color: #aaa; }
    #err { font-size: 12px; color: #f44336; margin-top: 8px; text-align: center; max-width: 300px; }
    #debug { font-size: 10px; color: #666; margin-top: 16px; max-width: 300px; text-align: left; max-height: 150px; overflow-y: auto; font-family: monospace; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div id="msg">카카오 공유 준비 중...</div>
  <div id="sub"></div>
  <div id="err"></div>
  <div id="debug"></div>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <script>
    const APP_KEY = 'cf840e74cf6ef3dcdd5cf2c128961fe1';
    const DEBUG = true;

    function log(msg) {
      if (DEBUG) {
        const debugEl = document.getElementById('debug');
        debugEl.textContent += msg + '\n';
        debugEl.scrollTop = debugEl.scrollHeight;
      }
      console.log('[투어링크]', msg);
    }

    // URL 파라미터 안전하게 추출
    function getUrlParams() {
      const params = new URLSearchParams(location.search);
      
      // 각 파라미터를 개별적으로 처리 (안전한 디코딩)
      let shareUrl = params.get('url') || 'https://www.tourlink.kr';
      let title = params.get('title') || '';
      let desc = params.get('desc') || '';
      let imgUrl = params.get('img') || '';

      // URL이 이미 한 번 디코딩되어 있으므로 그대로 사용
      // 다만 URL 형식 검증
      try {
        new URL(shareUrl);
        log('✓ URL 유효: ' + shareUrl.substring(0, 40) + '...');
      } catch (e) {
        log('✗ URL 유효하지 않음: ' + shareUrl);
        shareUrl = 'https://www.tourlink.kr';
      }

      // 이미지 URL 검증
      if (imgUrl) {
        try {
          new URL(imgUrl);
          log('✓ 이미지 URL 유효');
        } catch (e) {
          log('✗ 이미지 URL 유효하지 않음, 제거됨');
          imgUrl = '';
        }
      } else {
        log('- 이미지 URL 없음');
      }

      return { shareUrl, title, desc, imgUrl };
    }

    const { shareUrl, title, desc, imgUrl } = getUrlParams();

    log('📋 파라미터 파싱 완료');
    log('제목: ' + (title ? '"' + title + '"' : '(없음)'));
    log('설명: ' + (desc ? '"' + desc.substring(0, 30) + '..."' : '(없음)'));

    // 🔑 핵심: 클릭했을 때 vs 공유할 때 구분
    // 클릭: title과 desc 모두 비어있음 (URL만 있고 메타데이터 없음)
    // 공유: title 또는 desc 중 하나 이상 있음
    const isClickedLink = !title && !desc;
    
    log('🔍 판정: ' + (isClickedLink ? '링크 클릭 모드' : '공유 모드'));
    
    if (isClickedLink) {
      // 클릭: 바로 최종 URL로 이동 (bridge.html 안 보임!)
      log('🔗 링크 클릭 감지 → 바로 이동');
      window.location.href = shareUrl;
      throw new Error('redirect');
    }
    
    log('📤 공유 모드: 카카오톡으로 공유합니다');

    // 페이지 제목 업데이트
    document.getElementById('sub').textContent = title;

    function run() {
      try {
        log('🚀 카카오 SDK 초기화...');
        
        if (!Kakao.isInitialized()) {
          Kakao.init(APP_KEY);
          log('✓ Kakao 초기화 완료');
        }
        
        document.getElementById('msg').textContent = '📱 카카오 공유 팝업 열기...';

        log('📊 shareObject 구성 중...');
        log('  - title: ' + (title ? '"' + title + '"' : 'undefined'));
        log('  - desc: ' + (desc && desc.trim() ? '"' + desc.substring(0, 20) + '"' : 'undefined'));
        log('  - imgUrl: ' + (imgUrl && imgUrl.trim() ? '"' + imgUrl.substring(0, 30) + '"' : 'undefined'));
        
        // 카카오 공유 객체: 반드시 필드가 있어야 함
        const shareObject = {
          objectType: 'feed',
          content: {
            title: title || '투어링크',
            description: desc || '투어링크에서 공유했습니다',
            link: { 
              mobileWebUrl: shareUrl, 
              webUrl: shareUrl
            }
          },
          buttons: [{
            title: '확인하기',
            link: { 
              mobileWebUrl: shareUrl, 
              webUrl: shareUrl 
            }
          }]
        };
        
        // imageUrl은 유효할 때만 추가
        if (imgUrl && imgUrl.trim()) {
          shareObject.content.imageUrl = imgUrl;
        }

        log('📤 공유 실행...');
        log('🔍 shareObject:');
        log(JSON.stringify(shareObject, null, 2));
        console.log('[투어링크] shareObject 전체:', shareObject);
        console.log('[투어링크] imageUrl:', shareObject.content.imageUrl, 'type:', typeof shareObject.content.imageUrl);
        console.log('[투어링크] description:', shareObject.content.description, 'type:', typeof shareObject.content.description);
        
        Kakao.Share.sendDefault(shareObject);

        document.getElementById('msg').textContent = '✅ 친구를 선택하고 전송하세요';
        document.getElementById('sub').textContent = '';
        log('✓ 공유 팝업 성공');

      } catch(e) {
        document.getElementById('err').textContent = '오류: ' + e.message;
        log('✗ 오류: ' + e.message);
        console.error(e);
      }
    }

    // 페이지 로드 후 실행
    window.addEventListener('load', () => { 
      setTimeout(run, 800); 
    });

    // 5초 후 자동 창 닫기 (사용자가 공유하지 않으면)
    setTimeout(() => {
      if (window.opener) {
        window.close();
      }
    }, 5000);
  </script>
</body>
</html>
